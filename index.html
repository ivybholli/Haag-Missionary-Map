# Haag-Missionary-Map
<!DOCTYPE html>
<html>
<head>
  <title>Family Mission Map</title>

  <!-- Leaflet CSS (map styling) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h1>🌍 Family Mission Map</h1>

    <div class="card">
      <h3>Statistics</h3>
      <p>Total Missionaries: 127</p>
      <p>Countries Served: 42</p>
    </div>

    <div class="card">
      <h3>Filters</h3>

      <label>
        <input type="checkbox" checked>
        Elders
      </label>

      <br><br>

      <label>
        <input type="checkbox" checked>
        Sisters
      </label>

      <br><br>

      <label>
        <input type="checkbox" checked>
        Current Missionaries
      </label>
    </div>

  </div>

  <div id="map"></div>

</div>

</body>
</html>
