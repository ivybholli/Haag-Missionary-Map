<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haag Missionary Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h1>🌍 Haag Missionary Map</h1>

    <div class="card">
      <h3>Statistics</h3>
      <p>Total Missionaries: --</p>
      <p>Countries Served: --</p>
    </div>

    <div class="card">
      <h3>Legend</h3>
      <p>🔵 Elders</p>
      <p>🩷 Sisters</p>
    </div>

    <div class="card">
      <h3>Filters</h3>

      <label><input type="checkbox" checked> Elders</label>
      <br><br>

      <label><input type="checkbox" checked> Sisters</label>
      <br><br>

      <label><input type="checkbox" checked> Current Missionaries</label>

    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- YOUR APP -->
<script src="app.js"></script>

</body>
</html>
