<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haag Missionary Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <div class="sidebar">

    <h1>🌍 Haag Missionary Map</h1>

    <div class="card">
      <h3>Statistics</h3>
      <p>Total Missionaries: <span id="totalMissionaries">--</span></p>
      <p>Countries Served: <span id="countriesServed">--</span></p>
    </div>

    <div class="card">
      <h3>Legend</h3>
      <p>🔵 Elders</p>
      <p>🩷 Sisters</p>
    </div>

    <div class="card">
      <h3>Filters</h3>

      <label>
        <input type="checkbox" id="showElders" checked>
        Elders
      </label>

      <br><br>

      <label>
        <input type="checkbox" id="showSisters" checked>
        Sisters
      </label>
    </div>

  </div>

  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
