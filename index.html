<!DOCTYPE html>
<html>
<head>
  <title>Haag Missionary Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="sidebar">

    <h1>🌍 Haag Missionary Map</h1>

    <div class="card">
      <h3>Statistics</h3>
      <p>Total Missionaries: 127</p>
      <p>Countries Served: 42</p>
    </div>

    <div class="card">
      <h3>Filters</h3>

      <label><input type="checkbox" checked> Elders</label>
      <br><br>

      <label><input type="checkbox" checked> Sisters</label>
      <br><br>

      <label><input type="checkbox" checked> Current Missionaries</label>
    </div>

  </div>

  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
